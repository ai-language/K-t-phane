<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHG Kütüphane - Oynatıcı</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NHG Kütüphane">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background: #f0f4f8; }
#player { position: fixed; inset: 0; background: white; overflow: auto; }
</style>
</head>
<body>
<div id="player"></div>
<script>
(function(){
  let _id = new URL(location.href).searchParams.get('id') || sessionStorage.getItem('nhg-id');
  let _d = null;
  try { _d = JSON.parse(window.name || '{}'); } catch(e) {}
  if(!_id && _d?.nhg && _d?.id) _id = _d.id;

  let _html = _id ? (sessionStorage.getItem('nhg-player-html-'+_id) || localStorage.getItem('nhg-player-html-'+_id)) : null;
  if(!_html && _d?.nhg && _d?.html) _html = _d.html;

  let _pos = parseFloat(sessionStorage.getItem('nhg_pos_'+_id) || localStorage.getItem('nhg_pos_'+_id) || '0')||0;

  if(!_html || !_id) {
    const msg = !_id ? 'ID parametresi yok' : 'localStorage boş (Private Mode?)';
    document.getElementById('player').innerHTML = '<h1>❌ Hata</h1><p>'+msg+'</p><p style="font-size:.8rem;color:#888;">id='+(_id||'?')+', ls_keys='+Object.keys(localStorage).filter(k=>k.includes('nhg')).length+'</p>';
    return;
  }

  document.getElementById('player').innerHTML = _html;

  if('mediaSession'in navigator) {
    try {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: _id,
        artist: 'NHG Kütüphane'
      });
      const _audio = document.querySelector('audio');
      if(_audio) {
        if(_pos>0) _audio.currentTime = _pos;
        navigator.mediaSession.setActionHandler('play', function(){
          _audio.play().catch(function(){
            _audio.load();
            _audio.addEventListener('canplay', function(){
              _audio.currentTime = _pos;
              _audio.play().catch(function(){});
            }, {once: true});
          });
        });
        _audio.addEventListener('play', function(){
          navigator.mediaSession.playbackState = 'playing';
        });
        _audio.addEventListener('pause', function(){
          navigator.mediaSession.playbackState = 'paused';
        });
        _audio.addEventListener('timeupdate', function(){
          const n = Math.floor(_audio.currentTime);
          try { localStorage.setItem('nhg_pos_'+_id, n); } catch(e) {}
        });
      }
    } catch(e) {}
  }
})();
</script>
</body>
</html>
